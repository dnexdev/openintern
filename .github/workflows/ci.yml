name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm validate-curated
      - run: pnpm validate-companies
      - name: Validate company tokens
        if: github.event_name == 'pull_request'
        run: |
          mapfile -t CHANGED < <(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'data/companies/*.yaml' 'data/companies/*.yml' || true)
          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "No company YAML changes."
            exit 0
          fi
          echo "Validating: ${CHANGED[*]}"
          pnpm validate-tokens "${CHANGED[@]}"
        shell: bash
