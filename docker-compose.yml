services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: openintern
      POSTGRES_PASSWORD: openintern
      POSTGRES_DB: openintern
    ports:
      - "5432:5432"
    volumes:
      - openintern_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openintern -d openintern"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  openintern_pg:
